name: Test Runner for videomail-client (CI)

on:
  workflow_call:
  workflow_dispatch:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build-test-lint-check:
    name: Build, Test, Prettier, Lint and Check
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🪛 Install Node.js via nvm
        shell: bash --login {0}
        run: |
          nvm install --no-progress
          echo "$(dirname $(nvm which node))" >> $GITHUB_PATH

      - name: 📦 Install npm dependencies
        run: npm install

      - name: 🔎 Run prettier
        run: node --run prettier

      - name: 🔎 Run linter
        run: node --run lint

      - name: 🔎 Check types
        run: node --run types

      - name: 🔨 Build
        run: node --run build:prod

      - name: 🔎 Audit (detect vulnerabilities)
        run: node --run audit

      - name: 🔎 Run tests
        run: node --run test

      - name: 🔎 Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build:storybook
